    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter" error
      // caused by tracking scripts (like FB Pixel) trying to monkey-patch fetch in an iframe.
      try {
        if (window.fetch) {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return originalFetch; },
            set: function(newFetch) {
              Object.defineProperty(window, 'fetch', {
                value: newFetch,
                writable: true,
                configurable: true,
                enumerable: true
              });
            }
          });
        }
      } catch (e) {
        console.error('Failed to make fetch writable:', e);
      }

      // Patch JSON.stringify to handle circular references (e.g. from React Fiber nodes)
      // which can cause tracking scripts like UTMify to crash when stringifying DOM elements.
      const originalStringify = JSON.stringify;
      JSON.stringify = function(value, replacer, space) {
        try {
          return originalStringify(value, replacer, space);
        } catch (e) {
          if (e instanceof TypeError && e.message.toLowerCase().includes('circular')) {
            const cache = new Set();
            return originalStringify(value, (key, val) => {
              if (typeof val === 'object' && val !== null) {
                if (cache.has(val)) return '[Circular]';
                cache.add(val);
              }
              if (key.startsWith('__reactFiber$') || key.startsWith('__reactProps$')) {
                return undefined; // Ignore React internal properties
              }
              return typeof replacer === 'function' ? replacer(key, val) : val;
            }, space);
          }
          throw e;
        }
      };
    </script>
